[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  ./parser.conf

[INPUT]
    Name              tail
    Path              ./application.log
    Tag               myapp.log
    Parser            app_json

    Read_From_Head    Off
    Refresh_Interval  5
    Rotate_Wait       30
    Skip_Long_Lines   On
    Mem_Buf_Limit     20MB

[FILTER]
    Name              modify
    Match             myapp.log
    Add               application order-service
    Add               environment production

[OUTPUT]
    Name              http
    Match             myapp.log

    Host              127.0.0.1
    Port              8080 
    URI               /api/v1/logs
    Format            json

    Header            Content-Type application/json
    Retry_Limit       5
    Log_Response_Payload On
